<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <rect width="800" height="450" fill="#1e1e1e"/>
  <rect width="800" height="450" fill="url(#grid)" opacity="0.15"/>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1aa7ff" stroke-width="0.5"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1aa7ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#1aa7ff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <ellipse cx="400" cy="225" rx="200" ry="150" fill="url(#glow)"/>
  <circle cx="400" cy="225" r="40" fill="none" stroke="#1aa7ff" stroke-width="1.5" opacity="0.4"/>
  <circle cx="400" cy="225" r="60" fill="none" stroke="#1aa7ff" stroke-width="0.8" opacity="0.25"/>
  <circle cx="400" cy="225" r="80" fill="none" stroke="#1aa7ff" stroke-width="0.5" opacity="0.15"/>
  <line x1="360" y1="225" x2="440" y2="225" stroke="#1aa7ff" stroke-width="1.5" opacity="0.5"/>
  <line x1="400" y1="185" x2="400" y2="265" stroke="#1aa7ff" stroke-width="1.5" opacity="0.5"/>
</svg>
